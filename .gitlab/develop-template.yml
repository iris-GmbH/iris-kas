.develop_template:
  rules:
    # Do not run develop jobs on tagged commits
    - if: $CI_COMMIT_TAG
      when: never
    # Do not run merge request pipelines on merges to master branch
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event" && $CI_MERGE_REQUEST_TARGET_BRANCH_NAME == $RELEASE_BRANCH'
      when: never
    - when: on_success

  script:
    create-artifacts-folder:
      - mv ${KAS_TMPDIR} ${CI_JOB_NAME_SLUG}

  after_script:
    create-logs-folder:
      - mkdir -p ${CI_JOB_NAME_SLUG}/logs
      - find ${KAS_TMPDIR}/work -type f '(' -name "log.do_*" -o -name "log.task_order" ')' -exec rsync -R {} "${CI_JOB_NAME_SLUG}/logs" \;

  artifacts:
    develop-artifacts:
      name: "${CI_JOB_NAME}"
      # currently no support for seperate "on-failure" and "on-success" artifact sections: https://gitlab.com/gitlab-org/gitlab/-/issues/18744
      when: always
      paths:
        - "${CI_JOB_NAME_SLUG}/buildhistory"
        - "${CI_JOB_NAME_SLUG}/logs"
        - "${CI_JOB_NAME_SLUG}/deploy"
      expire_in: 7 days
