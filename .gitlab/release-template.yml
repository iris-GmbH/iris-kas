# release(/support) 
.release_template:
  rules:
    - if: '$CI_COMMIT_TAG'

  script:
    resolve-download-mirror-softlinks:
      # replace softlinks to download-mirror with hard copies
      - > 
        for f in $(find "${DL_DIR}" -type l); do
          # only check for absolute path links
          if $(readlink "$f" | grep -qP "^/.*$"); then
            cd "$(dirname $f)"
            link="$(readlink "$(basename $f)")"
            # remove target file beforehand, in case this links to directory. Otherwise this will not work
            rm "$(basename $f)"
            echo "copying ${link} to ${DL_DIR}/$(basename $f)"
            cp -rp "${link}" "$(basename $f)"
            cd - >/dev/null
          fi
        done
      # copy uninative binary shim from mirror into dl dir
      - echo "copying ${DOWNLOAD_MIRROR}/uninative to ${DL_DIR}/uninative"
      - cp -rp "${DOWNLOAD_MIRROR}/uninative/" "${DL_DIR}/uninative"
      # remove temporary files
      - rm -rf ${TMPDIR} ${DL_DIR}/git2

    # creates an archive ${ARTIFACT_NAME}.tar.gz from the folder ${ARTIFACT_FOLDER}
    create-archive-from-folder: # required vars: ARTIFACT_NAME, ARTIFACT_FOLDER
      # ensure all write operations are finished (might lead to deferred deletion otherwise)
      - sync
      - touch ${ARTIFACT_NAME}.tar.gz
      - tar -I "gzip --best" --exclude=${ARTIFACT_NAME}.tar.gz -cf ${ARTIFACT_NAME}.tar.gz ${ARTIFACT_FOLDER}
      - echo "${ARTIFACT_NAME}.tar.gz is $(echo -n $(ls -lh ${ARTIFACT_NAME}.tar.gz | awk '{print $5}')) in size."

    # move artifacts to toplevel, see: https://gitlab.com/gitlab-org/gitlab-runner/-/issues/1057
    move-artifacts-to-toplevel:
      - mkdir "irma6-${CI_COMMIT_TAG}-${MULTI_CONF}${ARTIFACT_SUFFIX}"
      - mv "${BUILDDIR}/buildhistory" "irma6-${CI_COMMIT_TAG}-${MULTI_CONF}${ARTIFACT_SUFFIX}"
      - mv "${TMPDIR}/deploy" "irma6-${CI_COMMIT_TAG}-${MULTI_CONF}${ARTIFACT_SUFFIX}"

  artifacts:
    release-source-artifacts:
      name: "irma6-${CI_COMMIT_TAG}-${MULTI_CONF}${ARTIFACT_SUFFIX}"
      paths:
        - "${MULTI_CONF}-base-sources.tar.gz"
      untracked: false
    release-artifacts:
      name: "irma6-${CI_COMMIT_TAG}-${MULTI_CONF}${ARTIFACT_SUFFIX}"
      paths:
        - "irma6-${CI_COMMIT_TAG}-${MULTI_CONF}${ARTIFACT_SUFFIX}"
      untracked: false
    release-oci-artifacts:
      name: "irma6-${CI_COMMIT_TAG}-${MULTI_CONF}${ARTIFACT_SUFFIX}"
      paths:
        - "${MULTI_CONF}-deploy.tar.gz"
      untracked: false
