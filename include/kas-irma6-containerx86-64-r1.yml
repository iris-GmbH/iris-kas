header:
  version: 9

target:
  - multiconfig:containerx86-64-r1

local_conf_header:
  # This does not really have an effect, when using the appropriate multi-conf,
  # as the distro feature is already there. However, as Yocto will parse
  # multiple configurations, the log will print a missleading warning message
  # about virtualization not enabled. This setting will prevent that.
  virtualization:
    DISTRO_FEATURES_append = " virtualization"
